{% load static %}
<html>
<head>
<title>Ministry of Housing and Urban Affairs</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
<script language="javascript">
	function validate(formObj)
	{
	if(formObj.t2.value.length==0)
	{
	alert("Please Upload Complaint Audio");
	formObj.t2.focus();
	return false;
	}
	formObj.actionUpdateData.value="update";
	return true;
	}
	</script>
	
</head>
<body>
<div class="main">
  <div class="main_resize">
    <div class="header">
      <div class="logo">
        <h1><span>Ministry of Housing and Urban Affairs</span><small></small></h1>
      </div>
    </div>
    <div class="content">
      <div class="content_bg">
        <div class="menu_nav">
           <ul>      
     <li><a href="{% url 'UploadAudio' %}"><font size="3" color="black">Audio Based Complaints</a></li>
	  <li><a href="{% url 'TextComplaint' %}"><font size="3" color="black">Text Based Complaints</a></li>
	  <li><a href="{% url 'TrackComplaint' %}"><font size="3" color="black">Track & Delete Complaints</a></li>
	  <li><a href="{% url 'index' %}"><font size="3" color="black">Logout</a></li>
   </ul>        
        </div>
        <div class="hbg"><img src="{% static 'images/header_images.jpg' %}" width="915" height="286" alt="" /></div>
      				<center>
<form name="f1" method="post" action={% url 'UploadAudioAction' %}  enctype="multipart/form-data" onsubmit="return validate(this);">
{% csrf_token %}<br/>
   <h2><b>Audio Based Complaint Screen</b></h2>
   
	<font size="" color="red"><center>{{ data }}</center></font>
						
						<table align="center" width="30%" >

						<tr><td><font size='' color="black"><b>Audio&nbsp;Language</b></td>
			 <td><select name="t1">
			 <option value="Telugu">Telugu</option>
			 <option value="Hindi">Hindi</option>
			 <option value="English">English</option>
			 </select>
			 </td></tr>

			 <tr><td><font size='' color="black"><b>Upload&nbsp;Audio</b></td>
			 <td><input type="file" name="t2" style="font-family: Comic Sans MS" size="25"></td></tr>
         
		 
			<tr><td></td><td><input type="submit" value="Submit"></td>
			</table>
				</div>	
					
				</div>
				
					
	</body>
</html>
